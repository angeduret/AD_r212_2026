
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mon super site</title>
  <style>
    /* ============================
       PROBLÈMES CSS À TROUVER :
       - styles dans le HTML (pas de fichier externe)
       - !important
       - sélecteurs trop spécifiques
       - hauteurs fixes
       - pas de variables CSS
       - pas de responsive
       - pas de transitions
       ============================ */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial;
      color: #333;
    }

    .header {
      background: #1a1a2e;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header .titre {
      font-size: 24px;
      font-weight: bold;
    }

    .header .nav ul {
      display: flex;
      list-style: none;
      gap: 20px;
    }

    .header .nav ul li a {
      color: white;
      text-decoration: none;
    }

    #main .content div.intro {
      padding: 40px 20px;
      text-align: center;
      background: #e8e8e8;
    }

    #main .content div.intro div.intro-titre {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .projets-section {
      padding: 20px;
    }

    .projets-section .section-titre {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .filtres-container {
      margin-bottom: 15px;
    }

    .filtres-container span {
      display: inline-block;
      padding: 5px 12px;
      margin-right: 8px;
      background: #ddd;
      cursor: pointer;
    }

    .filtres-container span.actif {
      background: #1a1a2e;
      color: white;
    }

    .grille-projets {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .grille-projets .carte-projet {
      width: 30%;
      height: 300px;
      border: 1px solid #ddd;
      padding: 15px;
      background: white;
    }

    .grille-projets .carte-projet .carte-titre {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .grille-projets .carte-projet .carte-description {
      color: #666;
      margin-bottom: 10px;
    }

    .grille-projets .carte-projet .carte-tags span {
      display: inline-block;
      padding: 2px 8px;
      background: #e0e7ff;
      color: #3b4cc0;
      font-size: 12px;
      margin-right: 4px;
    }

    .grille-projets .carte-projet .carte-bouton {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #1a1a2e;
      color: white;
      border: none;
      cursor: pointer;
    }

    .modale-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
    }

    .modale-overlay .modale-contenu {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 30px;
      width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modale-overlay .modale-contenu .modale-fermer {
      position: absolute;
      top: 10px; right: 15px;
      font-size: 24px;
      cursor: pointer;
      background: none;
      border: none;
    }

    .footer {
      background: #1a1a2e;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- PROBLÈME : pas de balises sémantiques, tout est en div -->
  <header>
    <h1>Portfolio</h1>
    <nav>
      <ul>
        <li><a href="#projets">Projets</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    <nav>
  </div>

  <main>

      <section">
        <h2>Bienvenue sur mon portfolio</h2>
        <p>Étudiante en MMI, passionnée par le web.</p>
  </section>

      <section>
        <h2>Mes projets</h2>

        <section>
          <button class="filtre actif" onclick="filtrer('tous')">Tous</button>
          <button class="filtre" onclick="filtrer('HTML')">HTML</button>
          <button class="filtre" onclick="filtrer('CSS')">CSS</button>
          <button class="filtre" onclick="filtrer('JS')">JS</button>
        </section>

        <div class="grille-projets" id="grille">
          <!-- Rempli par JS -->
        </div>
      </main>

    </div>
  </div>

  <!-- Modale -->
  <div class="modale-overlay" id="modale">
    <div class="modale-contenu">
      <span class="modale-fermer" onclick="fermerModale()">×</span>
      <div id="modale-body"></div>
    </div>
  </div>

  <footer>
    <p>© 2026 — Mon portfolio</p>
  </footer>

  <script>
    // ============================
    // PROBLÈMES JS À TROUVER :
    // - onclick inline (pas addEventListener)
    // - getElementById au lieu de querySelector
    // - element.style au lieu de classList
    // - pas de gestion clavier (Escape, Tab)
    // - pas d'attributs aria
    // - données et affichage mélangés
    // ============================

    var projets = [
      { id: 1, titre: "Site vitrine", description: "Un site pour une boulangerie locale. Design responsive et moderne.", tags: ["HTML", "CSS"] },
      { id: 2, titre: "Quiz interactif", description: "Application de quiz avec score et timer.", tags: ["JS", "HTML"] },
      { id: 3, titre: "Portfolio v1", description: "Ma première version de portfolio.", tags: ["HTML", "CSS"] },
      { id: 4, titre: "Dashboard météo", description: "Tableau de bord météo avec API Open Meteo.", tags: ["JS", "CSS"] },
      { id: 5, titre: "Blog tech", description: "Blog statique sur le développement web.", tags: ["HTML", "CSS", "JS"] },
      { id: 6, titre: "Jeu du pendu", description: "Jeu du pendu en JavaScript vanilla.", tags: ["JS"] }
    ];

    function afficherProjets(liste) {
      var grille = document.getElementById('grille');
      grille.innerHTML = '';
      for (var i = 0; i < liste.length; i++) {
        var p = liste[i];
        var carte = document.createElement('div');
        carte.className = 'carte-projet';
        carte.innerHTML = '<div class="carte-titre">' + p.titre + '</div>' +
          '<div class="carte-description">' + p.description + '</div>' +
          '<div class="carte-tags">' + p.tags.map(function(t) { return '<span>' + t + '</span>'; }).join('') + '</div>' +
          '<button class="carte-bouton" onclick="ouvrirModale(' + p.id + ')">Voir détail</button>';
        grille.appendChild(carte);
      }
    }

    function filtrer(tag) {
      // Gestion visuelle des filtres actifs
      var filtres = document.querySelectorAll('.filtre');
      for (var i = 0; i < filtres.length; i++) {
        filtres[i].style.background = '#ddd';
        filtres[i].style.color = '#333';
      }
      event.target.style.background = '#1a1a2e';
      event.target.style.color = 'white';

      if (tag === 'tous') {
        afficherProjets(projets);
      } else {
        var filtres = projets.filter(function(p) { return p.tags.indexOf(tag) !== -1; });
        afficherProjets(filtres);
      }
    }

    function ouvrirModale(id) {
      var projet = null;
      for (var i = 0; i < projets.length; i++) {
        if (projets[i].id === id) {
          projet = projets[i];
          break;
        }
      }
      if (!projet) return;

      document.getElementById('modale-body').innerHTML =
        '<h2>' + projet.titre + '</h2>' +
        '<p>' + projet.description + '</p>' +
        '<p>Tags : ' + projet.tags.join(', ') + '</p>';

      document.getElementById('modale').style.display = 'block';
    }

    function fermerModale() {
      document.getElementById('modale').style.display = 'none';
    }

    afficherProjets(projets);
  </script>

</body>
</html>
